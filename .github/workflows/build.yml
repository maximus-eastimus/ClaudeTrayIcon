name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# All targets are published from Linux runners. A self-contained .NET publish
# can cross-target every RID (win/macOS/linux) from any host, so we avoid the
# scarce/slow macOS runner queue. Binaries are unsigned (same as before).
jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, osx-arm64, osx-x64, linux-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single file
        run: >
          dotnet publish src/ClaudeTrayIcon/ClaudeTrayIcon.csproj
          -c Release -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeTrayIcon-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error

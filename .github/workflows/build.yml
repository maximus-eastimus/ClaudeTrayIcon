name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Eto.Forms multi-targets: net10.0-windows (WinForms backend) for Windows,
# net10.0 (GTK backend) for Linux. Both are cross-published from Linux runners.
jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            tfm: net10.0-windows
            os: windows-latest     # WinForms backend must build on Windows
          - rid: linux-x64
            tfm: net10.0
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single file
        run: >
          dotnet publish src/ClaudeTrayIcon/ClaudeTrayIcon.csproj
          -f ${{ matrix.tfm }} -c Release -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeTrayIcon-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
